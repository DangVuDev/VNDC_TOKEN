app:
  name: vndc-backend
  version: "1.0.0"
  environment: development
  debug: true

http:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "15s"
  write_timeout: "30s"
  idle_timeout: "60s"
  max_body_size: 1048576  # 1MB

database:
  uri: "mongodb://localhost:27017"
  name: "vndc_db"
  max_pool_size: 100
  min_pool_size: 5
  connect_timeout: "10s"
  timeout: "30s"
  max_conn_idle_time: "60s"

cache:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 5
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  max_retries: 3
  default_ttl: "30s"
  key_prefix: "vndc:"

blockchain:
  rpc_url: "http://127.0.0.1:8545"
  ws_url: "ws://127.0.0.1:8545"
  chain_id: 31337  # Local Hardhat
  network_name: "localhost"
  token_contract_address: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
  nft_contract_address: "0xa513E6E4b8f2a923D98304ec87F64353C4D5C853"
  marketplace_manager_address: "0x2279B7A0a67DB372996a5FaB50D91eAA73d2eBe6"
  relayer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  relayer_private_key: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"  # Hardhat account #0
  funding_manager_address: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
  dao_manager_address: "0x5FC8d32690cc91D4c39d9d3abcBD16989F875707"
  task_manager_address: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
  task_manager_signer_priv_key: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"  # Hardhat account #1
  max_gas_price_gwei: 100
  confirmation_blocks: 1   # Local dev — no waiting needed
  confirmation_interval: "1s"
  batch_size: 10
  batch_timeout: "10s"

auth:
  jwt_secret: "change-me-in-production"  # Inject via APP_AUTH_JWT_SECRET
  jwt_expiry: "24h"
  refresh_expiry: "168h"
  issuer: "vndc-backend"
  siwe_domain: "localhost"  # Domain shown in SIWE message; must match frontend origin

log:
  level: "debug"
  format: "console"
  development: true

worker:
  batch_size: 10
  max_transactions_per_session: 10
  batch_timeout: "10s"
  sync_interval: "10m"
  max_workers: 4
  queue_buffer_size: 1000
  retry_max: 3
  retry_delay: "5s"
  # TokenTransferWorker — auto-batch trigger via MongoDB Change Streams (or polling fallback)
  pending_threshold: 5          # trigger batch immediately when >= 5 PENDING txs exist
  trigger_interval: "30s"       # also trigger every 30 s regardless (and poll interval on standalone)
  change_stream_retry_delay: "5s"

metrics:
  enabled: true
  path: "/metrics"
  port: 9090
