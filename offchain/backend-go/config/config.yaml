app:
  environment: development
  debug: true

database:
  # Inject URI with APP_DATABASE_URI / DATABASE_URI / MONGODB_URI.
  uri: ""
  name: "vndc_db"

cache:
  addr: "localhost:6379"
  default_ttl: "30s"
  key_prefix: "vndc:"

blockchain:
  # Server runtime override:
  #   go run ./cmd/server --network local
  #   go run ./cmd/server --network sepolia
  #   go run ./cmd/server --network ethereum
  active_network: "local"

  networks:
    local:
      rpc_url: "http://127.0.0.1:8545"
      ws_url: "ws://127.0.0.1:8545"
      chain_id: 31337
      network_name: "localhost"
      token_contract_address: "0x21dF544947ba3E8b3c32561399E88B52Dc8b2823"
      nft_contract_address: "0x202CCe504e04bEd6fC0521238dDf04Bc9E8E15aB"
      marketplace_manager_address: "0x8198f5d8F8CfFE8f9C413d98a0A55aEB8ab9FbB7"
      relayer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      funding_manager_address: "0x51A1ceB83B83F1985a81C295d1fF28Afef186E02"
      dao_manager_address: "0x36b58F5C1969B7b6591D752ea6F5486D069010AB"
      task_manager_address: "0xDC11f7E700A4c898AE5CAddB1082cFfa76512aDD"
      confirmation_blocks: 1
      confirmation_interval: "1s"
      batch_timeout: "10s"

    sepolia:
      rpc_url: "https://ethereum-sepolia-rpc.publicnode.com"
      chain_id: 11155111
      network_name: "sepolia"
      token_contract_address: "0x2c54Aeeafe488248aBAeBA32695bD21212216484"
      confirmation_blocks: 2
      confirmation_interval: "12s"
      batch_timeout: "30s"

    ethereum:
      rpc_url: "https://ethereum-rpc.publicnode.com"
      chain_id: 1
      network_name: "ethereum"
      confirmation_blocks: 12
      confirmation_interval: "12s"
      batch_timeout: "1m"

auth:
  issuer: "vndc-backend"
  siwe_domain: "localhost"

log:
  level: "debug"
  format: "console"
  development: true

worker:
  batch_timeout: "10s"
  pending_threshold: 5
  trigger_interval: "30s"
  change_stream_retry_delay: "5s"
