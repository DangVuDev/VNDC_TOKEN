app:
  environment: development
  debug: true

database:
  # Inject URI with APP_DATABASE_URI / DATABASE_URI / MONGODB_URI.
  uri: ""
  name: "vndc_db"

cache:
  addr: "localhost:6379"
  default_ttl: "30s"
  key_prefix: "vndc:"

blockchain:
  # Server runtime override:
  #   go run ./cmd/server --network local
  #   go run ./cmd/server --network sepolia
  #   go run ./cmd/server --network ethereum
  active_network: "local"

  networks:
    local:
      rpc_url: "http://127.0.0.1:8545"
      ws_url: "ws://127.0.0.1:8545"
      chain_id: 31337
      network_name: "localhost"
      token_contract_address: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
      nft_contract_address: "0xA51c1fc2f0D1a1b8494Ed1FE312d7C3a78Ed91C0"
      marketplace_manager_address: "0x0DCd1Bf9A1b36cE34237eEaFef220932846BCD82"
      relayer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      funding_manager_address: "0x2279B7A0a67DB372996a5FaB50D91eAA73d2eBe6"
      dao_manager_address: "0x8A791620dd6260079BF849Dc5567aDC3F2FdC318"
      task_manager_address: "0xa513E6E4b8f2a923D98304ec87F64353C4D5C853"
      confirmation_blocks: 1
      confirmation_interval: "1s"
      batch_timeout: "10s"

    sepolia:
      rpc_url: "https://ethereum-sepolia-rpc.publicnode.com"
      chain_id: 11155111
      network_name: "sepolia"
      token_contract_address: "0x2c54Aeeafe488248aBAeBA32695bD21212216484"
      confirmation_blocks: 2
      confirmation_interval: "12s"
      batch_timeout: "30s"

    ethereum:
      rpc_url: "https://ethereum-rpc.publicnode.com"
      chain_id: 1
      network_name: "ethereum"
      confirmation_blocks: 12
      confirmation_interval: "12s"
      batch_timeout: "1m"

auth:
  issuer: "vndc-backend"
  siwe_domain: "localhost"

log:
  level: "debug"
  format: "console"
  development: true

worker:
  batch_timeout: "10s"
  pending_threshold: 5
  trigger_interval: "30s"
  change_stream_retry_delay: "5s"
